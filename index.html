<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRACU CGPA Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #0b1120;
    }

    .dashboard-card {
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-glow {
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
    }
  </style>
</head>

<body class="text-slate-200 min-h-screen">

  <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="https://www.bracu.ac.bd/sites/default/files/resources/media/bracu_logo.png" class="w-10 h-10"
          alt="BRACU">
        <span class="text-xl font-extrabold tracking-tight text-white">CGPA<span
            class="text-blue-500">Dash</span></span>
      </div>
      <div class="flex gap-4">
        <button id="resetApp" class="text-xs font-semibold text-slate-400 hover:text-white transition-colors">RESET
          DATA</button>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-3 gap-8">

    <div class="lg:col-span-2 space-y-8">

      <section class="dashboard-card rounded-3xl p-8">
        <h2 class="text-lg font-bold text-white mb-1">1. Sync Your Record</h2>
        <p class="text-sm text-slate-400 mb-6">Upload your unofficial gradesheet to auto-fill your profile[cite: 8, 21].
        </p>

        <div id="dropZone"
          class="border-2 border-dashed border-slate-700 rounded-2xl p-8 text-center hover:border-blue-500 transition-all group cursor-pointer">
          <input type="file" id="pdfUpload" accept=".pdf" class="hidden">
          <label for="pdfUpload" class="cursor-pointer">
            <i
              class="fas fa-cloud-upload-alt text-4xl text-slate-600 group-hover:text-blue-500 mb-4 transition-colors"></i>
            <p class="text-sm font-semibold text-slate-300">Click or drag your PDF here</p>
            <p id="pdfStatus" class="text-xs text-slate-500 mt-2 italic">Supports BRACU Undergraduate Gradesheets[cite:
              10, 23].</p>
          </label>
        </div>
      </section>

      <section class="dashboard-card rounded-3xl p-8">
        <h2 class="text-lg font-bold text-white mb-6">2. Current Academic Standing</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Cumulative GPA</label>
            <input type="number" id="currentCGPA" step="0.01"
              class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Credits Completed</label>
            <input type="number" id="completedCredits"
              class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>
      </section>

      <section class="dashboard-card rounded-3xl p-8">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-lg font-bold text-white">3. Semester Planner</h2>
          <button type="button" id="addCourseBtn"
            class="text-xs bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg transition-all">+ Add
            Course</button>
        </div>

        <div id="courseInputs" class="space-y-4">
        </div>
      </section>
    </div>

    <div class="space-y-8">

      <div id="resultCard" class="dashboard-card rounded-3xl p-8 border-blue-500/30 stat-glow sticky top-28">
        <h3 class="text-center text-xs font-bold uppercase tracking-widest text-blue-400 mb-4">Projected Result</h3>
        <div class="text-center">
          <span id="finalGPA" class="text-7xl font-black text-white tracking-tighter">0.00</span>
          <p id="standingTag"
            class="text-xs font-bold mt-4 px-3 py-1 rounded-full inline-block bg-slate-800 text-slate-400">INPUT DATA TO
            START</p>
        </div>

        <div class="mt-8 space-y-4 pt-8 border-t border-slate-800">
          <div class="flex justify-between text-sm">
            <span class="text-slate-500 font-semibold">Total Credits After Semester</span>
            <span id="projectedCredits" class="text-white font-bold">0</span>
          </div>
          <button id="calculateBtn"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/20 active:scale-95">
            Update Prediction
          </button>
        </div>
      </div>

      <div id="historySection" class="hidden dashboard-card rounded-3xl overflow-hidden">
        <button id="toggleHistory" class="w-full p-6 text-left flex justify-between items-center font-bold text-white">
          <span>Transcript Records </span>
          <i class="fas fa-chevron-down text-xs"></i>
        </button>
        <div id="historyContent" class="overflow-hidden transition-all duration-300">
          <div class="max-h-96 overflow-y-auto px-6 pb-6">
            <table class="w-full text-xs">
              <tbody id="historyBody" class="divide-y divide-slate-800"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>

</html>
